<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة منتج</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
font-family:'Tajawal',sans-serif;
display:flex;
justify-content:center;
align-items:center;
padding:50px;
margin:0;
}

.form-box{
background:#06264D;
padding:40px;
border-radius:20px;
width:600px;
color:white;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:#D4AF37;
margin-bottom:25px;
}

input,
textarea,
select{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#0b2f5c;
color:white;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:25px;
background:#D4AF37;
color:#041C3A;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

</style>

</head>

<body>

<div class="form-box">

<h1>
إضافة منتج
</h1>

<input
type="text"
id="title"
placeholder="اسم المنتج">

<textarea
id="description"
placeholder="وصف المنتج">
</textarea>

<input
type="number"
id="price"
placeholder="السعر">

<input
type="file"
id="image">

<select id="category">

<option>
الأجهزة الإلكترونية
</option>

<option>
الأزياء والموضة
</option>

<option>
المركبات
</option>

<option>
البيت والمطبخ
</option>

<option>
الأم والطفل
</option>

</select>

<button id="publishBtn">
نشر المنتج
</button>

</div>

<script>

const SUPABASE_URL =
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY =
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

document
.getElementById("publishBtn")
.addEventListener(
"click",
addProduct
)

async function addProduct(){

const btn=
document.getElementById(
"publishBtn"
)

btn.disabled=true
btn.innerText="جاري النشر..."

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

if(!session){

alert("يجب تسجيل الدخول")

btn.disabled=false
btn.innerText="نشر المنتج"

return

}

const title=
document.getElementById(
"title"
).value

const description=
document.getElementById(
"description"
).value

const price=
document.getElementById(
"price"
).value

const category=
document.getElementById(
"category"
).value

const imageFile=
document.querySelector(
'input[type="file"]'
).files[0]

if(
!title||
!description||
!price
){

alert(
"املأ جميع الحقول"
)

btn.disabled=false
btn.innerText="نشر المنتج"

return

}

const sellerName=
session.user.email

let imageUrl=""

if(imageFile){

const fileName=
Date.now()+"-"+imageFile.name

const {
error:uploadError
}
=
await supabaseClient
.storage
.from("products")
.upload(
fileName,
imageFile
)

if(uploadError){

alert(
"فشل رفع الصورة"
)

btn.disabled=false
btn.innerText="نشر المنتج"

return

}

const {
data:imageData
}
=
supabaseClient
.storage
.from("products")
.getPublicUrl(
fileName
)

imageUrl=
imageData.publicUrl

}

const {
data,
error
}
=
await supabaseClient
.from("products")
.insert({

title:title,
description:description,
price:price,
image:imageUrl,
category:category,
stock:1,
seller_name:sellerName,
seller_id:session.user.id

})
.select()

if(error){

console.log(error)

alert(
error.message
)

btn.disabled=false
btn.innerText="نشر المنتج"

return

}

const productId=
data[0].id

window.location.href=
"product-details.html?id="+productId

}

</script>

</body>
</html>
