<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إضافة منتج</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
body{
background:#041C3A;
font-family:'Tajawal',sans-serif;
display:flex;
justify-content:center;
align-items:center;
padding:50px;
}
.form-box{
background:#06264D;
padding:40px;
border-radius:20px;
width:600px;
color:white;
}
h1{
text-align:center;
color:#D4AF37;
}
input,textarea,select{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#0b2f5c;
color:white;
}
button{
width:100%;
padding:15px;
margin-top:20px;
background:#D4AF37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>
<div class="form-box">
<h1>إضافة منتج</h1>
<input type="text" placeholder="اسم المنتج">
<textarea placeholder="وصف المنتج"></textarea>
<input type="number" placeholder="السعر">
<input type="file">
<select>
<option>الأجهزة الإلكترونية</option>
<option>الأزياء والموضة</option>
<option>المركبات</option>
<option>البيت والمطبخ</option>
<option>الأم والطفل</option>
</select>
<button>نشر المنتج</button>
</div>
</html>
