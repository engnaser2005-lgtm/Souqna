<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
استفسارات البائع
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
font-family:Tajawal;
margin:0;
padding:30px;
color:white;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:25px;
color:#D4AF37;
}

#list{
display:flex;
flex-direction:column;
gap:15px;
}

.item{
background:#06264D;
padding:20px;
border-radius:15px;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.08);
}

.item:hover{
transform:translateY(-3px);
background:#0b2f5c;
}

.product{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
color:#D4AF37;
}

.text{
font-size:15px;
opacity:.9;
line-height:1.7;
}

.time{
margin-top:10px;
font-size:13px;
opacity:.6;
}

a{
text-decoration:none;
color:white;
}

.empty{
background:#06264D;
padding:30px;
border-radius:15px;
text-align:center;
font-size:18px;
}

</style>

</head>

<body>

<div class="title">
استفسارات العملاء
</div>

<div id="list"></div>

<script>

const SUPABASE_URL =
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY =
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function loadConversations(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

if(!session){

alert("يجب تسجيل الدخول")

return

}

const sellerId =
session.user.id

const {
data,
error
}
=
await supabaseClient
.from("conversations")
.select(`
*,
products(title),
messages(
message,
created_at
)
`)
.eq(
"seller_id",
sellerId
)
.order(
"created_at",
{ascending:false}
)

if(error){

console.log(error)

return

}

const container =
document.getElementById("list")

container.innerHTML = ""

if(!data || !data.length){

container.innerHTML = `

<div class="empty">

لا توجد استفسارات حالياً

</div>

`

return

}

data.forEach(conv=>{

const lastMessage =
conv.messages?.length
? conv.messages[conv.messages.length - 1].message
: "لا توجد رسائل"

container.innerHTML += `

<a href="
inquiry.html?conversation_id=${conv.id}
">

<div class="item">

<div class="product">

${conv.products?.title || "منتج"}

</div>

<div class="text">

آخر رسالة:
${lastMessage}

</div>

<div class="time">

${new Date(conv.created_at)
.toLocaleString("ar-EG")}

</div>

</div>

</a>

`

})

}

loadConversations()

setInterval(()=>{

loadConversations()

},5000)

</script>

</body>

</html>
