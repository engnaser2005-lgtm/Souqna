<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>رسائل العملاء</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
color:white;
font-family:Tajawal;
padding:30px;
}

.box{
background:#06264D;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

textarea{
width:100%;
height:100px;
padding:10px;
margin-top:10px;
}

button{
background:#D4AF37;
padding:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<h1>
رسائل العملاء
</h1>

<div id="messages">
جاري التحميل...
</div>

<script>

const SUPABASE_URL=
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY=
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"


const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function loadMessages(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

const sellerId=
session.user.id

const {data}
=
await supabaseClient
.from("conversations")
.select("*")
.eq(
"seller_id",
sellerId
)

const container=
document.getElementById(
"messages"
)

container.innerHTML=""

data.forEach(item=>{

container.innerHTML+=`

<div class="box">

رقم الاستعلام:
${item.id}

<br><br>

<button
onclick="
window.location=
'inquiry.html?id=${item.id}'
">
فتح المحادثة
</button>

</div>

`

})

}

loadMessages()

</script>

</body>
</html>
