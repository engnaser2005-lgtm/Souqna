<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>استفسارات العملاء</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
color:white;
font-family:Tajawal,sans-serif;
padding:30px;
}

h1{
text-align:center;
color:#D4AF37;
margin-bottom:30px;
}

.message-card{
background:#06264D;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

.message{
margin-bottom:15px;
font-size:18px;
}

textarea{
width:100%;
height:100px;
background:#0b2f5c;
color:white;
border:1px solid #D4AF37;
border-radius:10px;
padding:10px;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#D4AF37;
color:#041C3A;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<h1>
استفسارات العملاء
</h1>

<div id="messages">
جاري التحميل...
</div>

<script>

const SUPABASE_URL=
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY=
"ضع نفس المفتاح"

const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function loadMessages(){

const {
data:{session}
}
=
await supabaseClient
.auth
.getSession()

const sellerId=
session.user.id

const {
data,
error
}
=
await supabaseClient
.from("messages")
.select("*")
.eq(
"seller_id",
sellerId
)

const container=
document.getElementById(
"messages"
)

container.innerHTML=""

if(data.length===0){

container.innerHTML=
"لا توجد استفسارات"

return

}

data.forEach(msg=>{

container.innerHTML+=`

<div class="message-card">

<div class="message">

${msg.message}

</div>

<textarea
id="reply-${msg.id}"
placeholder="اكتب الرد">
</textarea>

<button
onclick="
sendReply(
'${msg.id}',
'${msg.buyer_id}'
)
">

إرسال الرد

</button>

</div>

`

})

}

async function sendReply(
messageId,
buyerId
){

const text=
document
.getElementById(
`reply-${messageId}`
)
.value

const {
data:{session}
}
=
await supabaseClient
.auth
.getSession()

const sellerId=
session.user.id

await supabaseClient
.from("replies")
.insert({

message_id:messageId,
seller_id:sellerId,
buyer_id:buyerId,
reply:text

})

alert(
"تم إرسال الرد"
)

location.reload()

}

loadMessages()

</script>

</body>

</html>
