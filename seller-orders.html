<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
طلبات الشراء
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
color:white;
font-family:Tajawal;
padding:30px;
}

.order-box{
background:#06264D;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.status{
color:#D4AF37;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<h1>
طلبات الشراء
</h1>

<div id="orders">
جاري التحميل...
</div>

<script>

const SUPABASE_URL=
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY=
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"


const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function loadOrders(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

if(!session){

window.location=
"login.html"

return

}

const sellerId=
session.user.id

const {
data,
error
}
=
await supabaseClient
.from("orders")
.select("*")
.eq(
"seller_id",
sellerId
)
.order(
"created_at",
{ascending:false}
)

const container=
document.getElementById(
"orders"
)

container.innerHTML=""

if(!data || data.length===0){

container.innerHTML=
"لا توجد طلبات"

return

}

data.forEach(order=>{

container.innerHTML+=`

<div class="order-box">

رقم الطلب:
${order.id}

<br><br>

المبلغ:
${order.amount}$

<div class="status">

الحالة:
${order.status}

</div>

</div>

`

})

}

loadOrders()

</script>

</body>

</html>
