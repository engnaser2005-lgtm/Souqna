<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>طلبات الشراء</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
color:white;
font-family:Tajawal,sans-serif;
padding:30px;
}

.card{
background:#06264D;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#D4AF37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<h1>
طلبات الشراء
</h1>

<div id="orders">
جاري التحميل...
</div>

<script>

const supabaseClient=
supabase.createClient(
"https://dkhjaktcjbnndxtxcetf.supabase.co",
"ضع نفس المفتاح"
)

async function loadOrders(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

const sellerId=
session.user.id

const {
data
}
=
await supabaseClient
.from("orders")
.select("*")
.eq(
"seller_id",
sellerId
)

const container=
document.getElementById(
"orders"
)

container.innerHTML=""

if(!data.length){

container.innerHTML=
"لا توجد طلبات"

return

}

data.forEach(order=>{

container.innerHTML+=`

<div class="card">

<p>
رقم المنتج:
${order.product_id}
</p>

<p>
المبلغ:
${order.amount}
</p>

<select
id="status-${order.id}"
>

<option value="pending">
طلب جديد
</option>

<option value="waiting_payment">
قيد الدفع
</option>

<option value="paid">
تم الدفع
</option>

<option value="delivered">
تم التسليم
</option>

<option value="completed">
انتهت العملية
</option>

</select>

<button
onclick="
updateOrder(
'${order.id}'
)
">

حفظ الحالة

</button>

</div>

`

})

}

async function updateOrder(id){

const status=
document.getElementById(
`status-${id}`
).value

await supabaseClient
.from("orders")
.update({
status:status
})
.eq(
"id",
id
)

alert("تم تحديث الحالة")

}

loadOrders()

</script>

</body>
</html>
