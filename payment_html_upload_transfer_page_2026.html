<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع إثبات التحويل</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
background:#041C3A;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
background:#06264D;
padding:30px;
border-radius:15px;
width:450px;
}
button{
width:100%;
padding:12px;
margin-top:20px;
background:#D4AF37;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
input{
width:100%;
padding:12px;
margin-top:15px;
}
</style>
</head>
<body>
<div class="box">
<h2>رفع صورة التحويل</h2>
<p>ارفع صورة التحويل البنكي أو الإيصال</p>
<input type="file" id="paymentImage">
<button id="uploadBtn">رفع الصورة</button>
</div>
<script>
const SUPABASE_URL="https://dkhjaktcjbnndxtxcetf.supabase.co"
const SUPABASE_KEY="ضع نفس المفتاح الموجود عندك"
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

document.getElementById('uploadBtn').addEventListener('click',uploadPayment)

async function uploadPayment(){
const params=new URLSearchParams(window.location.search)
const orderId=params.get('order')

const image=document.getElementById('paymentImage').files[0]

if(!image){
alert('اختر صورة')
return
}

const fileName=Date.now()+image.name

const {error:uploadError}=await supabaseClient
.storage
.from('payments')
.upload(fileName,image)

if(uploadError){
alert('فشل رفع الصورة')
return
}

const {data}=supabaseClient
.storage
.from('payments')
.getPublicUrl(fileName)

const imageUrl=data.publicUrl

const {error}=await supabaseClient
.from('orders')
.update({
payment_image:imageUrl,
payment_status:'uploaded'
})
.eq('id',orderId)

if(error){
alert('فشل تحديث الطلب')
return
}

alert('تم رفع صورة التحويل بنجاح')
window.location.href='index.html'
}
</script>
</body>
</html>
