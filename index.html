<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوقنا | سوق متعدد البائعين</title>
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #020C1B;
      --bg-secondary: #0A192F;
      --bg-card: rgba(255, 255, 255, 0.05);
      --text-primary: #E6F1FF;
      --text-secondary: #A8B2D1;
      --text-muted: #8892B0;
      --gold-primary: #D4AF37;
      --gold-light: #F1E0A6;
      --border: rgba(212, 175, 55, 0.2);
      --shadow-gold: rgba(212, 175, 55, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Tajawal', sans-serif; 
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 25, 47, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 15px 5%;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold-primary);
      text-decoration: none;
    }

    .search-bar {
      flex: 1;
      max-width: 500px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text-primary);
      font-size: 15px;
    }

    .auth-btns {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s;
      font-size: 14px;
      font-family: 'Tajawal', sans-serif;
    }

    .btn-gold {
      background: var(--gold-primary);
      color: var(--bg-primary);
    }

    .btn-gold:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--shadow-gold);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .hero {
      height: 500px;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content h1 {
      font-size: 56px;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(90deg, var(--gold-primary), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-content p {
      font-size: 20px;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }

    section {
      max-width: 1400px;
      margin: 80px auto;
      padding: 0 5%;
    }

    .section-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 40px;
    }

    .section-title span {
      color: var(--gold-primary);
    }

    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }

    .product {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s;
    }

    .product:hover {
      transform: translateY(-10px);
      border-color: var(--gold-primary);
      box-shadow: 0 20px 40px var(--shadow-gold);
    }

    .product-img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .product-info {
      padding: 20px;
    }

    .product h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: var(--text-primary);
    }

    .product .price {
      font-size: 24px;
      font-weight: 800;
      color: var(--gold-primary);
      margin-bottom: 15px;
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }

    @media (max-width: 768px) {
      .search-bar { display: none; }
      .hero-content h1 { font-size: 36px; }
      #products { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">سوقنا</a>
      
      <div class="search-bar">
        <input type="text" placeholder="ابحث عن منتج...">
      </div>

      <div class="auth-btns">
        <button class="btn btn-outline" style="display:none" id="btn-add" onclick="location.href='add-product.html'">إضافة منتج</button>
        <button class="btn btn-outline" onclick="location.href='signup.html?type=seller'">بائع</button>
        <button class="btn btn-outline" onclick="location.href='signup.html?type=buyer'">مشتري</button>
        <button class="btn btn-gold" id="logoutBtn" style="display:none" onclick="logout()">خروج</button>
      </div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-content">
      <h1>تسوق بفخامة</h1>
      <p>أفضل المنتجات من أفضل البائعين في مكان واحد</p>
      <button class="btn btn-gold" onclick="document.getElementById('featured').scrollIntoView()">تصفح الآن</button>
    </div>
  </div>

  <section id="featured">
    <h2 class="section-title">المنتجات <span>المميزة</span></h2>
    <div id="products">
      <p class="loading">جاري تحميل المنتجات...</p>
    </div>
  </section>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://guhocivwbrfhgjynzesy.supabase.co', 'sb_publishable_w0yAXfyfGpu0IHw64IINgA_cyLEZyN1')

    async function loadProducts() {
      try {
        const { data: products, error } = await supabase
          .from('products')
          .select('*')
          .eq('status', 'approved')

        const container = document.getElementById('products')
        
        if (error) {
          console.error('خطأ Supabase:', error)
          container.innerHTML = '<p class="loading">حدث خطأ في تحميل المنتجات</p>'
          return
        }

        if (!products || products.length === 0) {
          container.innerHTML = '<p class="loading">لا توجد منتجات متاحة حالياً</p>'
          return
        }

        container.innerHTML = products.map(p => `
          <div class="product">
            <img src="${p.image_url || 'https://via.placeholder.com/300x250?text=No+Image'}" class="product-img" loading="lazy">
            <div class="product-info">
              <h3>${p.name}</h3>
              <div class="price">${p.price} ريال</div>
              <button class="btn btn-gold" style="width:100%" onclick="location.href='details.html?id=${p.id}'">شراء</button>
            </div>
          </div>
        `).join('')
        
      } catch (err) {
        console.error('خطأ عام:', err)
        document.getElementById('products').innerHTML = '<p class="loading">حدث خطأ غير متوقع</p>'
      }
    }

   async function checkUser() {
  try {
    const { data: { user } = await supabase.auth.getUser()
    
    if (user) {
      document.getElementById('logoutBtn').style.display = 'inline-block'
      
      const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single()
      
      if (profile?.role === 'seller') {
        document.getElementById('btn-add').style.display = 'inline-block'
      }
    }
  } catch (err) {
    console.error('خطأ في checkUser:', err)
  }
}
    window.logout = async () => {
      await supabase.auth.signOut()
      location.reload()
    }

    loadProducts()
    checkUser()
  </script>
</body>
</html>
