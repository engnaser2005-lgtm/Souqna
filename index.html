<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوقنا - منصة البائعين</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', Arial, sans-serif; }
    body { background: #f5f5f5; }
    header { background: #1e3a5f; color: white; padding: 20px; text-align: center; }
    header h1 { font-size: 2rem; margin-bottom: 5px; }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .product { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.3s; }
    .product:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .product h3 { color: #1e3a5f; margin-bottom: 10px; font-size: 1.1rem; }
    .product p { color: #666; font-size: 0.9rem; margin-bottom: 10px; }
    .product .price { color: #28a745; font-weight: bold; font-size: 1.2rem; }
    .loading, .error, .empty { text-align: center; padding: 40px; font-size: 1.1rem; color: #666; }
    .error { color: #dc3545; }
  </style>
</head>
<body>
  <header>
    <h1>سوقنا 🛍️</h1>
    <p>منصة لعرض منتجات البائعين</p>
  </header>

  <div class="container">
    <div id="products" class="loading">جاري تحميل المنتجات...</div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // مفاتيح Supabase حقتك
    const SUPABASE_URL = 'https://guhocivwbrfhgjynzesy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1aG9jaXZ3YnJmaGdqeW56ZXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTIwNjMsImV4cCI6MjA5NDE2ODA2M30.AdH_Ur_Fh72WzCvrD-JXzVUeE3HRofStWjUv600SSWE';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadProducts() {
      const container = document.getElementById('products');
      
      try {
        const { data, error } = await supabase
          .from('products')
          .select('*')
          .eq('status', 'approved')
          .order('created_at', { ascending: false });

        if (error) {
          container.className = 'error';
          container.innerHTML = 'خطأ في تحميل المنتجات';
          console.error('Supabase Error:', error);
          return;
        }

        if (!data || data.length === 0) {
          container.className = 'empty';
          container.innerHTML = 'لا توجد منتجات حالياً';
          return;
        }

        container.className = 'products-grid';
        container.innerHTML = data.map(product => `
          <div class="product">
            <h3>${product.name || 'منتج بدون اسم'}</h3>
            <p>${product.description || ''}</p>
            <div class="price">${product.price || 0} ريال</div>
          </div>
        `).join('');

      } catch (err) {
        container.className = 'error';
        container.innerHTML = 'حدث خطأ غير متوقع';
        console.error('Error:', err);
      }
    }

    loadProducts();
  </script>
</body>
</html>
