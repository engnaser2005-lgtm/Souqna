<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>سوقنا</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = 'https://dkhjaktcjbnnndxtxcetf.supabase.co'

    const supabaseKey = 'sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd'

    const supabase = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    )
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #0A1F44;
      color: white;
    }

    header {
      background: #081730;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #D4AF37;
    }

    header h1 {
      color: #D4AF37;
      font-size: 32px;
    }

    .container {
      width: 90%;
      margin: 40px auto;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
      border-color: #D4AF37;
    }

    .product-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .product-info {
      padding: 15px;
    }

    .product-info h3 {
      color: #D4AF37;
      margin-bottom: 10px;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      font-size: 22px;
      margin-top: 40px;
      color: #D4AF37;
    }
  </style>
</head>
<body>

<header>
  <h1>سوقنا</h1>
</header>

<div class="container">
  <div id="loading" class="loading">
    جاري تحميل المنتجات...
  </div>

  <div class="products" id="productsContainer"></div>
</div>

<script>
  async function loadProducts() {
    const loading = document.getElementById('loading')
    const container = document.getElementById('productsContainer')

    const { data, error } = await supabase
      .from('products')
      .select('*')

    loading.style.display = 'none'

    if (error) {
      container.innerHTML = '<h2>حدث خطأ أثناء تحميل المنتجات</h2>'
      console.error(error)
      return
    }

    if (!data || data.length === 0) {
      container.innerHTML = '<h2>لا توجد منتجات حالياً</h2>'
      return
    }

    data.forEach(product => {
      const card = document.createElement('div')
      card.className = 'product-card'

      card.innerHTML = `
        <img src="${product.image || 'https://via.placeholder.com/300'}" alt="${product.title}">

        <div class="product-info">
          <h3>${product.title}</h3>

          <p>${product.description || ''}</p>

          <div class="price">
            ${product.price || 0} $
          </div>
        </div>
      `

      container.appendChild(card)
    })
  }

  loadProducts()
</script>

</body>
</html>
