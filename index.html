<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوقنا</title>
  <style>
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    .add-product {
      max-width: 600px;
      margin: 0 auto 40px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .add-product input, .add-product select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .add-product button {
      background: #28a745;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
    }
    .add-product button:hover {
      background: #218838;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .tabs button {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      background: #f8f9fa;
      cursor: pointer;
      border-radius: 8px;
    }
    .tabs button.active {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }
    #url-input, #file-input { display: none; }
    #url-input.active, #file-input.active { display: block; }
    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .product h3 { margin: 10px 0 5px; color: #222; font-size: 18px; }
    .product p { color: #007bff; font-weight: bold; font-size: 20px; margin: 5px 0 15px; }
    .product button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>مرحباً بك في سوقنا</h1>

  <div class="add-product">
    <h3>إضافة منتج جديد</h3>
    <input type="text" id="name" placeholder="اسم المنتج" required>
    <input type="number" id="price" placeholder="السعر" required>
    
    <div class="tabs">
      <button type="button" class="active" onclick="switchTab('url')">رابط صورة</button>
      <button type="button" onclick="switchTab('file')">رفع من الجوال</button>
    </div>

    <div id="url-input" class="active">
      <input type="url" id="image_url" placeholder="الصق رابط الصورة هنا">
    </div>
    
    <div id="file-input">
      <input type="file" id="image_file" accept="image/*">
    </div>

    <button onclick="addProduct()">إضافة المنتج</button>
  </div>

  <div id="products"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://guhocivwbrfhgjynzesy.supabase.co'
    const supabaseKey = 'sb_publishable_w0yAXfyfGpu0IHw64IINgA_cyLEZyN1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    window.switchTab = function(tab) {
      document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
      document.getElementById('url-input').classList.remove('active');
      document.getElementById('file-input').classList.remove('active');
      
      if (tab === 'url') {
        document.querySelector('.tabs button:first-child').classList.add('active');
        document.getElementById('url-input').classList.add('active');
      } else {
        document.querySelector('.tabs button:last-child').classList.add('active');
        document.getElementById('file-input').classList.add('active');
      }
    }

    async function loadProducts() {
      const { data: products, error } = await supabase
        .from('products')
        .select('*')
        .eq('status', 'approved')

      if (error) {
        console.error('خطأ:', error)
        return
      }

      const container = document.getElementById('products')
      container.innerHTML = ''

      if (!products || products.length === 0) {
        container.innerHTML = '<p style="text-align:center">لا توجد منتجات متاحة حالياً</p>'
        return
      }

      products.forEach(p => {
        container.innerHTML += `
          <div class="product">
            <img src="${p.image_url || 'https://via.placeholder.com/250x200?text=No+Image'}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>${p.price} ريال</p>
            <button onclick="window.location.href='details.html?id=${p.id}'">اشتري الآن</button>
          </div>
        `
      })
    }

    window.addProduct = async function() {
      const name = document.getElementById('name').value
      const price = document.getElementById('price').value
      let imageUrl = document.getElementById('image_url').value
      const imageFile = document.getElementById('image_file').files[0]

      if (!name || !price) {
        alert('املأ اسم المنتج والسعر')
        return
      }

      // رفع الصورة لو اختار ملف
      if (imageFile) {
        const fileName = `${Date.now()}_${imageFile.name}`
        const { data, error } = await supabase.storage
          .from('products')
          .upload(fileName, imageFile)

        if (error) {
          alert('فشل رفع الصورة: ' + error.message)
          return
        }

        const { data: { publicUrl } = supabase.storage
          .from('products')
          .getPublicUrl(fileName)
        
        imageUrl = publicUrl
      }

      const { error } = await supabase.from('products').insert([
        { name, price, image_url: imageUrl, status: 'approved' }
      ])

      if (error) {
        alert('فشل إضافة المنتج: ' + error.message)
        return
      }

      alert('تم إضافة المنتج بنجاح!')
      document.getElementById('name').value = ''
      document.getElementById('price').value = ''
      document.getElementById('image_url').value = ''
      document.getElementById('image_file').value = ''
      loadProducts()
    }

    loadProducts()
  </script>

</body>
</html>
