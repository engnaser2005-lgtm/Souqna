<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوقنا | سوق متعدد البائعين</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-blue: #0A192F;
      --secondary-blue: #112240;
      --gold: #D4AF37;
      --gold-light: #F1E0A6;
      --text-light: #E6F1FF;
      --text-muted: #8892B0;
      --bg-dark: #020C1B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Tajawal', sans-serif; 
      background: var(--bg-dark);
      color: var(--text-light);
      overflow-x: hidden;
    }

    /* Navbar */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 25, 47, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      padding: 15px 5%;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      text-decoration: none;
    }

    .search-bar {
      flex: 1;
      max-width: 500px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 50px;
      color: var(--text-light);
      font-size: 15px;
      transition: all 0.3s;
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }

    .auth-btns {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s;
      font-size: 14px;
    }

    .btn-gold {
      background: var(--gold);
      color: var(--dark-blue);
    }

    .btn-gold:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-light);
      border: 1px solid rgba(212, 175, 55, 0.5);
    }

    .btn-outline:hover {
      background: rgba(212, 175, 55, 0.1);
      border-color: var(--gold);
    }

    /* Hero Slider */
    .hero {
      height: 500px;
      background: linear-gradient(135deg, var(--dark-blue) 0%, var(--secondary-blue) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .hero-content h1 {
      font-size: 56px;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-content p {
      font-size: 20px;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    /* Sections */
    section {
      max-width: 1400px;
      margin: 80px auto;
      padding: 0 5%;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-light);
    }

    .section-title span {
      color: var(--gold);
    }

    /* Product Grid */
    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }

    .product {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s;
      position: relative;
    }

    .product:hover {
      transform: translateY(-10px);
      border-color: var(--gold);
      box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
    }

    .product-img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .product:hover .product-img {
      transform: scale(1.05);
    }

    .product-info {
      padding: 20px;
    }

    .product h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: var(--text-light);
    }

    .product .price {
      font-size: 24px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 15px;
    }

    .product-actions {
      display: flex;
      gap: 10px;
    }

    .product-actions button {
      flex: 1;
    }

    /* Animations */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.6s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .search-bar { display: none; }
      .hero-content h1 { font-size: 36px; }
      #products { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">سوقنا</a>
      
      <div class="search-bar">
        <input type="text" placeholder="ابحث عن منتج...">
      </div>

      <div class="auth-btns">
        <button class="btn btn-outline" style="display:none" id="btn-add" onclick="location.href='add-product.html'">إضافة منتج</button>
        <button class="btn btn-outline" onclick="location.href='signup.html?type=seller'">بائع</button>
        <button class="btn btn-outline" onclick="location.href='signup.html?type=buyer'">مشتري</button>
        <button class="btn btn-gold" id="logoutBtn" style="display:none" onclick="logout()">خروج</button>
      </div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-content fade-in">
      <h1>تسوق بفخامة</h1>
      <p>أفضل المنتجات من أفضل البائعين في مكان واحد</p>
      <button class="btn btn-gold" onclick="document.getElementById('featured').scrollIntoView()">تصفح الآن</button>
    </div>
  </div>

  <section id="featured">
    <div class="section-header">
      <h2 class="section-title">المنتجات <span>المميزة</span></h2>
    </div>
    <div id="products"></div>
  </section>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://guhocivwbrfhgjynzesy.supabase.co', 'sb_publishable_w0yAXfyfGpu0IHw64IINgA_cyLEZyN1')

    async function loadProducts() {
      const { data: products, error } = await supabase
        .from('products')
        .select('*')
        .eq('status', 'approved')

      const container = document.getElementById('products')
      
      if (error || !products || products.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:var(--text-muted)">لا توجد منتجات متاحة</p>'
        return
      }

      container.innerHTML = products.map((p, i) => `
        <div class="product fade-in" style="animation-delay: ${i * 0.1}s">
          <img src="${p.image_url || 'https://via.placeholder.com/300x250?text=No+Image'}" class="product-img">
          <div class="product-info">
            <h3>${p.name}</h3>
            <div class="price">${p.price} ريال</div>
            <div class="product-actions">
              <button class="btn btn-gold" onclick="location.href='details.html?id=${p.id}'">شراء</button>
            </div>
          </div>
        </div>
      `).join('')
    }

    async function checkUser() {
      const { data: { user } = await supabase.auth.getUser()
      
      if (user) {
        document.getElementById('logoutBtn').style.display = 'inline-block'
        
        const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single()
        
        if (profile?.role === 'seller') {
          document.getElementById('btn-add').style.display = 'inline-block'
        }
      }
    }

    window.logout = async () => {
      await supabase.auth.signOut()
      location.reload()
    }

    loadProducts()
    checkUser()
  </script>
</body>
</html>
