<script>

const SUPABASE_URL =
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY =
"ضع_هنا_المفتاح_العام_الحقيقي"

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function checkUser(){

const {
data:{session}
} =
await supabaseClient.auth.getSession()

const loginLink =
document.getElementById("loginLink")

const signupLink =
document.getElementById("signupLink")

const userBox =
document.getElementById("userBox")

const userName =
document.getElementById("userName")

if(session && session.user){

loginLink.style.display = "none"
signupLink.style.display = "none"

userBox.style.display = "flex"

userName.innerText =
session.user.email

}else{

loginLink.style.display = "block"
signupLink.style.display = "block"

userBox.style.display = "none"

}

}

async function logout(){

await supabaseClient.auth.signOut()

alert("تم تسجيل الخروج")

window.location.href = "index.html"

}

async function loadProducts(){

const container =
document.getElementById("products")

container.innerHTML =
`<div class="loading">جاري تحميل المنتجات...</div>`

const { data , error } =
await supabaseClient
.from("products")
.select("*")
.order("created_at",{ascending:false})

if(error){

console.log(error)

container.innerHTML =
`<div class="loading">
فشل تحميل المنتجات
</div>`

return

}

if(!data || data.length === 0){

container.innerHTML =
`<div class="loading">
لا توجد منتجات حالياً
</div>`

return

}

container.innerHTML = ""

data.forEach(product=>{

container.innerHTML += `

<div class="product-card">

<img
class="product-image"
src="${product.image}"
onerror="this.src='https://via.placeholder.com/400x300?text=Souqna'">

<div class="product-content">

<div class="product-title">
${product.title}
</div>

<div class="product-price">
${product.price} $
</div>

<div class="product-description">
${product.description}
</div>

<div class="rating">
★★★★★
</div>

<div class="product-buttons">

<button class="buy-btn">
شراء
</button>

<a href="product-details.html" style="flex:1;">

<button class="details-btn">
التفاصيل
</button>

</a>

</div>

</div>

</div>

`

})

}

function searchProducts(){

const input =
document.getElementById("searchInput")

const value =
input.value.toLowerCase()

const cards =
document.querySelectorAll(".product-card")

cards.forEach(card=>{

const title =
card.querySelector(".product-title")
.innerText.toLowerCase()

if(title.includes(value)){

card.style.display = "block"

}else{

card.style.display = "none"

}

})

}

async function checkSeller(){

const {
data:{session}
} =
await supabaseClient.auth.getSession()

if(!session){

window.location.href =
"login.html"

return

}

window.location.href =
"add-product.html"

}

window.addEventListener("load", async ()=>{

await checkUser()

await loadProducts()

})

supabaseClient.auth.onAuthStateChange(
async (event, session)=>{

await checkUser()

}
)

</script>
