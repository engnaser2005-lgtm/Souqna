<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Souqna Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#041C3A;
--bg2:#06264D;
--gold:#D4AF37;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tajawal',sans-serif;
}

body{
background:var(--bg);
color:white;
}

header{
background:#03152c;
padding:20px;
border-bottom:2px solid var(--gold);
position:sticky;
top:0;
z-index:100;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1200px;
margin:auto;
}

.logo{
font-size:42px;
font-weight:700;
color:var(--gold);
}

.auth-buttons{
display:flex;
gap:10px;
}

.btn{
background:var(--gold);
color:#000;
padding:10px 18px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
opacity:0.9;
}

.hero{
padding:60px 20px 30px;
text-align:center;
}

.hero h1{
font-size:58px;
color:var(--gold);
margin-bottom:15px;
}

.hero p{
font-size:22px;
color:#ddd;
margin-bottom:30px;
}

.search-box{
display:flex;
justify-content:center;
margin-bottom:25px;
}

.search-box input{
width:450px;
max-width:90%;
padding:15px;
border-radius:12px;
border:none;
outline:none;
font-size:18px;
background:#0b2f5c;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

.search-box input::placeholder{
color:#ccc;
}

.categories{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

.cat-btn{
background:#0b2f5c;
color:var(--gold);
border:1px solid rgba(255,255,255,0.1);
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.cat-btn:hover{
background:var(--gold);
color:black;
}

.products{
max-width:1300px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:var(--bg2);
border-radius:18px;
overflow:hidden;
transition:0.3s;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
background:#0b2f5c;
}

.card-content{
padding:18px;
}

.card-title{
font-size:24px;
color:var(--gold);
margin-bottom:10px;
font-weight:700;
}

.card-price{
font-size:22px;
font-weight:bold;
margin-bottom:12px;
}

.card-description{
color:#ddd;
line-height:1.7;
}

.loading{
text-align:center;
font-size:30px;
color:var(--gold);
padding:60px;
}

.empty{
text-align:center;
font-size:26px;
color:var(--gold);
padding:60px;
}

footer{
margin-top:50px;
padding:25px;
text-align:center;
border-top:1px solid rgba(255,255,255,0.1);
color:#bbb;
}

@media(max-width:768px){

.logo{
font-size:30px;
}

.hero h1{
font-size:42px;
}

.topbar{
flex-direction:column;
gap:15px;
}

}

</style>

</head>

<body>

<header>

<div class="topbar">

<div class="logo">
Souqna Fashion
</div>

<div class="auth-buttons">
<a href="signup.html" class="btn">تسجيل</a>
<a href="login.html" class="btn">دخول</a>
</div>

</div>

</header>

<section class="hero">

<h1>أحدث صيحات الملابس</h1>

<p>
تسوق أفضل الملابس الرجالية والنسائية بأفضل الأسعار
</p>

<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث عن منتج...">
</div>

<div class="categories">

<button class="cat-btn">رجالي</button>

<button class="cat-btn">نسائي</button>

<button class="cat-btn">أطفال</button>

<button class="cat-btn">أحذية</button>

<button class="cat-btn">حقائب</button>

</div>

</section>

<div id="loading" class="loading">
جاري تحميل المنتجات...
</div>

<div class="products" id="products"></div>

<footer>
جميع الحقوق محفوظة © Souqna Fashion
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = 'https://dkhjaktcjbnndxtxcetf.supabase.co'

const supabaseKey = 'sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd'

const supabase = window.supabase.createClient(
supabaseUrl,
supabaseKey
)

async function loadProducts(searchTerm = ""){

const productsContainer = document.getElementById("products")

const loading = document.getElementById("loading")

productsContainer.innerHTML = ""

loading.style.display = "block"

let query = supabase
.from("products")
.select("*")
.order("created_at",{ascending:false})

if(searchTerm){

query = query.ilike("title", `%${searchTerm}%`)

}

const { data , error } = await query

loading.style.display = "none"

if(error){

productsContainer.innerHTML = `
<div class="empty">
فشل تحميل المنتجات
</div>
`

console.log(error)

return
}

if(!data || data.length === 0){

productsContainer.innerHTML = `
<div class="empty">
لا توجد منتجات حالياً
</div>
`

return
}

data.forEach(product=>{

const card = document.createElement("div")

card.className = "card"

card.innerHTML = `

<img src="${product.image || 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600'}">

<div class="card-content">

<div class="card-title">
${product.title || 'منتج بدون اسم'}
</div>

<div class="card-price">
${product.price || 0} $
</div>

<div class="card-description">
${product.description || 'لا يوجد وصف'}
</div>

</div>

`

productsContainer.appendChild(card)

})

}

const searchInput = document.getElementById("searchInput")

searchInput.addEventListener("input", ()=>{

loadProducts(searchInput.value)

})

loadProducts()

</script>

</body>

</html>
