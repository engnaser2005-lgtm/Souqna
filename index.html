<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوقنا</title>
  <style>
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s;
    }
    .product:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .product h3 {
      margin: 10px 0 5px;
      color: #222;
      font-size: 18px;
    }
    .product p {
      color: #007bff;
      font-weight: bold;
      font-size: 20px;
      margin: 5px 0 15px;
    }
    .product button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .product button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h1>مرحباً بك في سوقنا</h1>
  <div id="products"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://guhocivwbrfhgjynzesy.supabase.co'
    const supabaseKey = 'sb_publishable_w0yAXfyfGpu0IHw64IINgA_cyLEZ...'
    const supabase = createClient(supabaseUrl, supabaseKey)

    async function loadProducts() {
      const { data: products, error } = await supabase
        .from('products')
        .select('*')
        .eq('status', 'approved')

      if (error) {
        console.error('خطأ:', error)
        document.getElementById('products').innerHTML = '<p style="text-align:center">حدث خطأ في جلب المنتجات</p>'
        return
      }

      const container = document.getElementById('products')
      container.innerHTML = ''

      if (!products || products.length === 0) {
        container.innerHTML = '<p style="text-align:center">لا توجد منتجات متاحة حالياً</p>'
        return
      }

      products.forEach(p => {
        container.innerHTML += `
          <div class="product">
            <img src="${p.image_url || 'https://via.placeholder.com/250x200?text=No+Image'}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>${p.price} ريال</p>
            <button onclick="window.location.href='details.html?id=${p.id}'">اشتري الآن</button>
          </div>
        `
      })
    }

    loadProducts()
  </script>

</body>
</html>
