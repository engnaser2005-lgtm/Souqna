<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوقنا</title>
  <style>
    body { font-family: 'Tajawal', Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 30px; }
    header h1 { margin: 0; color: #333; }
    .auth-btns button { margin-right: 10px; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-seller { background: #28a745; color: white; }
    .btn-buyer { background: #007bff; color: white; }
    .btn-add { background: #ff9800; color: white; display: none; }
    #products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
    .product { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .product img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    .product h3 { margin: 10px 0 5px; color: #222; font-size: 18px; }
    .product p { color: #007bff; font-weight: bold; font-size: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>سوقنا</h1>
    <div class="auth-btns">
      <button class="btn-add" onclick="location.href='add-product.html'">إضافة منتج</button>
      <button class="btn-seller" onclick="location.href='signup.html?type=seller'">تسجيل كبائع</button>
      <button class="btn-buyer" onclick="location.href='signup.html?type=buyer'">تسجيل كمشتري</button>
      <button class="btn-buyer" id="logoutBtn" style="display:none" onclick="logout()">خروج</button>
    </div>
  </header>

  <div id="products"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://guhocivwbrfhgjynzesy.supabase.co', 'sb_publishable_w0yAXfyfGpu0IHw64IINgA_cyLEZyN1')

    // عرض المنتجات
    async function loadProducts() {
      const { data: products } = await supabase.from('products').select('*').eq('status', 'approved')
      const container = document.getElementById('products')
      container.innerHTML = products.map(p => `
        <div class="product">
          <img src="${p.image_url || 'https://via.placeholder.com/250x200'}">
          <h3>${p.name}</h3>
          <p>${p.price} ريال</p>
        </div>
      `).join('')
    }

    // تشيك إذا المستخدم بائع
    async function checkUser() {
      const { data: { user } = await supabase.auth.getUser()
      if (user) {
        document.getElementById('logoutBtn').style.display = 'inline-block'
        // جيب role من جدول profiles
        const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single()
        if (profile?.role === 'seller') {
          document.querySelector('.btn-add').style.display = 'inline-block'
        }
      }
    }

    window.logout = async () => {
      await supabase.auth.signOut()
      location.reload()
    }

    loadProducts()
    checkUser()
  </script>
</body>
</html>
