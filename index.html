<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سوقنا</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#041C3A;
--bg2:#06264D;
--gold:#D4AF37;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tajawal',sans-serif;
}

body{
background:var(--bg);
color:white;
}

header{
background:#03152c;
padding:20px;
border-bottom:2px solid var(--gold);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1200px;
margin:auto;
}

.logo{
font-size:42px;
font-weight:700;
color:var(--gold);
}

.auth-buttons{
display:flex;
gap:10px;
}

.btn{
background:var(--gold);
color:#000;
padding:10px 18px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
opacity:0.9;
transform:translateY(-2px);
}

.hero{
padding:40px 20px;
text-align:center;
}

.hero h1{
font-size:42px;
color:var(--gold);
margin-bottom:10px;
}

.hero p{
font-size:20px;
color:#ddd;
margin-bottom:25px;
}

.search-box{
display:flex;
justify-content:center;
}

.search-box input{
width:400px;
max-width:90%;
padding:14px;
border-radius:10px;
border:none;
outline:none;
font-size:18px;
background:#0b2f5c;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

.search-box input::placeholder{
color:#ccc;
}

.products{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--bg2);
border:1px solid rgba(255,255,255,0.1);
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
background:#0b2f5c;
}

.card-content{
padding:15px;
}

.card-title{
font-size:22px;
margin-bottom:10px;
color:var(--gold);
}

.card-price{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.loading{
text-align:center;
font-size:28px;
color:var(--gold);
padding:50px;
}

.empty{
text-align:center;
font-size:24px;
color:var(--gold);
padding:40px;
}

</style>

</head>

<body>

<header>

<div class="topbar">

<div class="logo">سوقنا</div>

<div class="auth-buttons">
<a href="signup.html" class="btn">تسجيل</a>
<a href="login.html" class="btn">دخول</a>
</div>

</div>

</header>

<section class="hero">

<h1>أفضل المنتجات</h1>

<p>
تصفح منتجات البائعين بكل سهولة
</p>

<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث عن منتج...">
</div>

</section>

<div id="loading" class="loading">
جاري تحميل المنتجات...
</div>

<div class="products" id="products"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = 'https://dkhjaktcjbnndxtxcetf.supabase.co'

const supabaseKey = 'sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd'

const supabase = window.supabase.createClient(
supabaseUrl,
supabaseKey
)

async function loadProducts(searchTerm = ""){

const productsContainer = document.getElementById("products")

const loading = document.getElementById("loading")

productsContainer.innerHTML = ""

loading.style.display = "block"

let query = supabase
.from("products")
.select("*")
.order("created_at",{ascending:false})

if(searchTerm){

query = query.ilike("title", `%${searchTerm}%`)

}

const { data , error } = await query

loading.style.display = "none"

if(error){

productsContainer.innerHTML = `
<div class="empty">
فشل تحميل المنتجات
</div>
`

console.log(error)

return
}

if(!data || data.length === 0){

productsContainer.innerHTML = `
<div class="empty">
لا توجد منتجات
</div>
`

return
}

data.forEach(product=>{

const card = document.createElement("div")

card.className = "card"

card.innerHTML = `

<img src="${product.image || 'https://via.placeholder.com/400'}">

<div class="card-content">

<div class="card-title">
${product.title || 'بدون اسم'}
</div>

<div class="card-price">
${product.price || 0} $
</div>

<p>
${product.description || ''}
</p>

</div>

`

productsContainer.appendChild(card)

})

}

const searchInput = document.getElementById("searchInput")

searchInput.addEventListener("input", ()=>{

loadProducts(searchInput.value)

})

loadProducts()

</script>

</body>

</html>
