<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>الاستعلام</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
color:white;
font-family:Tajawal;
padding:30px;
}

.box{
max-width:800px;
margin:auto;
background:#06264D;
padding:20px;
border-radius:20px;
}

.messages{
height:400px;
overflow:auto;
background:#0b2f5c;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.message{
background:#163d70;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
background:#D4AF37;
border:none;
font-size:18px;
font-weight:bold;
cursor:pointer;
border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>
استعلام عن المنتج
</h2>

<div
class="messages"
id="messages">
</div>

<input
id="messageInput"
placeholder="اكتب سؤالك">

<button
onclick="sendMessage()">

إرسال

</button>

</div>

<script>

const SUPABASE_URL=
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY=
"ضع المفتاح نفسه الموجود في index"

const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const productId=
localStorage.getItem(
"productId"
)

const sellerId=
localStorage.getItem(
"sellerId"
)

let conversationId=""

async function initConversation(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

if(!session){

alert("يجب تسجيل الدخول")

return

}

const buyerId=
session.user.id

const {
data:conversation,
error
}
=
await supabaseClient
.from("conversations")
.select("*")
.eq(
"product_id",
productId
)
.eq(
"buyer_id",
buyerId
)
.maybeSingle()

if(error){

console.log(error)

}

if(conversation){

conversationId=
conversation.id

}else{

const {
data:newConversation,
error:insertError
}
=
await supabaseClient
.from("conversations")
.insert({

product_id:productId,
buyer_id:buyerId,
seller_id:sellerId

})
.select()
.single()

if(insertError){

console.log(insertError)

alert("فشل إنشاء المحادثة")

return

}

conversationId=
newConversation.id

}

loadMessages()

}

async function loadMessages(){

if(!conversationId)return

const {
data:messages,
error
}
=
await supabaseClient
.from("messages")
.select("*")
.eq(
"conversation_id",
conversationId
)
.order(
"created_at",
{ascending:true}
)

if(error){

console.log(error)

return

}

const container=
document.getElementById(
"messages"
)

container.innerHTML=""

if(!messages || !messages.length){

container.innerHTML=
"لا توجد رسائل بعد"

return

}

messages.forEach(msg=>{

container.innerHTML+=`

<div class="message">

${msg.message}

</div>

`

})

container.scrollTop=
container.scrollHeight

}

async function sendMessage(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

if(!session){

alert("يجب تسجيل الدخول")

return

}

const text=
document.getElementById(
"messageInput"
).value

if(!text)return

const {
error
}
=
await supabaseClient
.from("messages")
.insert({

conversation_id:
conversationId,

sender_id:
session.user.id,

message:
text

})

if(error){

console.log(error)

alert("فشل إرسال الرسالة")

return

}

document.getElementById(
"messageInput"
).value=""

loadMessages()

}

initConversation()

setInterval(()=>{
loadMessages()
},3000)

</script>

</body>

</html>
