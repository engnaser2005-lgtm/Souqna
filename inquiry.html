<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>الاستعلام عن المنتج</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
font-family:Tajawal,sans-serif;
color:white;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:#06264D;
padding:30px;
border-radius:20px;
}

h1{
color:#D4AF37;
margin-bottom:25px;
text-align:center;
}

textarea{

width:100%;
height:200px;
background:#0b2f5c;
border:1px solid #D4AF37;
border-radius:15px;
padding:15px;
font-size:18px;
color:white;
outline:none;
resize:none;

}

button{

margin-top:20px;
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
background:#D4AF37;
border:none;
border-radius:12px;
cursor:pointer;
color:#041C3A;

}

</style>

</head>

<body>

<div class="container">

<h1>
إرسال استعلام للبائع
</h1>

<textarea
id="message"
placeholder="اكتب سؤالك هنا">
</textarea>

<button onclick="sendInquiry()">

إرسال

</button>

</div>

<script>

const SUPABASE_URL=
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY=
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"

const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function sendInquiry(){

const text=
document
.getElementById("message")
.value

if(text===""){

alert("اكتب الاستعلام")

return

}

const {
data:{session}
}
=
await supabaseClient
.auth
.getSession()

if(!session){

window.location.href=
"login.html"

return

}

const buyerId=
session.user.id

const productId=
localStorage.getItem(
"productId"
)

const sellerId=
localStorage.getItem(
"sellerId"
)

const {error}
=
await supabaseClient
.from("messages")
.insert({

product_id:productId,
buyer_id:buyerId,
seller_id:sellerId,
message:text

})

if(error){

console.log(error)

alert(
"فشل إرسال الاستعلام"
)

return

}

alert(
"تم إرسال الاستعلام بنجاح"
)

window.location.href=
"index.html"

}

</script>

</body>

</html>
