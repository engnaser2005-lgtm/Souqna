<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
استفسارات البائع
</title>

<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
font-family:Tajawal;
margin:0;
padding:30px;
color:white;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:25px;
color:#D4AF37;
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
background:#D4AF37;
color:#041C3A;
padding:8px 15px;
border-radius:30px;
font-size:15px;
font-weight:bold;
}

#list{
display:flex;
flex-direction:column;
gap:15px;
}

.item{
background:#06264D;
padding:20px;
border-radius:15px;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.08);
}

.item:hover{
transform:translateY(-3px);
background:#0b2f5c;
}

.product{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
color:#D4AF37;
}

.text{
font-size:15px;
opacity:.9;
line-height:1.8;
}

.time{
margin-top:10px;
font-size:13px;
opacity:.6;
}

.count{
margin-top:12px;
display:inline-block;
background:#D4AF37;
color:#041C3A;
padding:6px 12px;
border-radius:30px;
font-size:13px;
font-weight:bold;
}

a{
text-decoration:none;
color:white;
}

.empty{
background:#06264D;
padding:30px;
border-radius:15px;
text-align:center;
font-size:18px;
}

</style>

</head>

<body>

<div class="title">

<span>
استفسارات العملاء
</span>

<span
class="badge"
id="totalCount">

0

</span>

</div>

<div id="list"></div>

<script>

const SUPABASE_URL =
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY =
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function loadConversations(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

if(!session){

alert("يجب تسجيل الدخول")

return

}

const sellerId =
session.user.id

const {
data,
error
}
=
await supabaseClient
.from("conversations")
.select(`
*,
products(
title
),
messages(
id,
message,
created_at
)
`)
.eq(
"seller_id",
sellerId
)
.order(
"created_at",
{ascending:false}
)

if(error){

console.log(
"conversation error",
error
)

return

}

const container =
document.getElementById(
"list"
)

container.innerHTML = ""

document.getElementById(
"totalCount"
).innerText =
data?.length || 0

if(!data || !data.length){

container.innerHTML = `

<div class="empty">

لا توجد استفسارات حالياً

</div>

`

return

}

data.forEach(conv=>{

const lastMessage =
conv.messages?.length
? conv.messages[
conv.messages.length - 1
].message
: "لا توجد رسائل"

const totalMessages =
conv.messages?.length || 0

container.innerHTML += `

<a href="
chat.html?conversation_id=${conv.id}
">

<div class="item">

<div class="product">

${conv.products?.title || "منتج"}

</div>

<div class="text">

آخر رسالة:
${lastMessage}

</div>

<div class="count">

عدد الرسائل:
${totalMessages}

</div>

<div class="time">

${new Date(conv.created_at)
.toLocaleString("ar-EG")}

</div>

</div>

</a>

`

})

}

loadConversations()

supabaseClient
.channel("seller-realtime")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"messages"
},
payload=>{

console.log(
"new message",
payload
)

loadConversations()

if(Notification.permission==="granted"){

new Notification(
"رسالة جديدة"
)

}

}
)
.subscribe()

if(
Notification.permission !==
"granted"
){

Notification.requestPermission()

}

</script>

</body>

</html>
