<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تفاصيل المنتج</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
font-family:'Tajawal',sans-serif;
margin:0;
padding:40px;
color:white;
}

.container{
background:#06264D;
padding:30px;
border-radius:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

img{
width:100%;
border-radius:20px;
object-fit:cover;
}

h1{
color:#D4AF37;
margin-top:0;
}

.price{
font-size:30px;
margin:20px 0;
font-weight:bold;
color:#D4AF37;
}

button{
padding:15px 25px;
border:none;
border-radius:10px;
font-weight:bold;
margin-left:10px;
cursor:pointer;
font-family:'Tajawal',sans-serif;
font-size:16px;
}

.buy{
background:#D4AF37;
color:#041C3A;
}

.whatsapp{
background:#25D366;
color:white;
}

.loading{
text-align:center;
font-size:25px;
padding:40px;
}

.description{
line-height:2;
color:#E5E5E5;
}

@media(max-width:768px){

.container{
grid-template-columns:1fr;
}

body{
padding:20px;
}

}

</style>

</head>

<body>

<div id="productBox" class="loading">
جاري تحميل المنتج...
</div>

<script>

const SUPABASE_URL =
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY =
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const params =
new URLSearchParams(
window.location.search
)

const productId =
params.get("id")

async function loadProduct(){

const container =
document.getElementById(
"productBox"
)

if(!productId){

container.innerHTML =
"المنتج غير موجود"

return

}

const {
data,
error
}
=
await supabaseClient
.from("products")
.select("*")
.eq("id", productId)
.single()

if(error || !data){

console.error(error)

container.innerHTML =
"فشل تحميل المنتج"

return

}

/*
تصحيح الحقول حسب جدول المنتجات الحقيقي:

image بدلاً من image_url
title بدلاً من name
seller_id بدلاً من user_id
*/

const productImage =
data.image ||
"images/default-product.png"

const productTitle =
data.title ||
"بدون عنوان"

const productDescription =
data.description ||
"لا يوجد وصف للمنتج"

const productPrice =
data.price ||
0

const sellerId =
data.seller_id || ""

container.innerHTML =

`

<div class="container">

<div>

<img
src="${productImage}"
alt="${productTitle}"
onerror="this.src='images/default-product.png'"
>

</div>

<div>

<h1>
${productTitle}
</h1>

<p class="description">
${productDescription}
</p>

<div class="price">
${productPrice} $
</div>

<button class="buy">
طلب شراء
</button>

<a
href="https://wa.me/967000000000?text=مرحباً، أريد الاستفسار عن المنتج: ${encodeURIComponent(productTitle)}"
target="_blank"
>

<button class="whatsapp">
استعلام واتساب
</button>

</a>

<h2>
تقييم البائع
</h2>

<p>
★★★★★
</p>

<p>
رقم البائع:
${sellerId}
</p>

</div>

</div>

`

}

loadProduct()

</script>

</body>

</html>
