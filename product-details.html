<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تفاصيل المنتج</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
font-family:'Tajawal',sans-serif;
margin:0;
padding:40px;
color:white;
}

.container{
background:#06264D;
padding:30px;
border-radius:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

img{
width:100%;
border-radius:20px;
}

h1{
color:#D4AF37;
}

.price{
font-size:30px;
margin:20px 0;
}

button{
padding:15px 25px;
border:none;
border-radius:10px;
font-weight:bold;
margin-left:10px;
cursor:pointer;
}

.buy{
background:#D4AF37;
}

.whatsapp{
background:#25D366;
color:white;
}

.loading{
text-align:center;
font-size:25px;
padding:40px;
}

</style>

</head>

<body>

<div id="productBox" class="loading">
جاري تحميل المنتج...
</div>

<script>

const SUPABASE_URL =
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY =
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const params =
new URLSearchParams(
window.location.search
)

const productId =
params.get("id")

async function loadProduct(){

const container =
document.getElementById(
"productBox"
)

if(!productId){

container.innerHTML =
"المنتج غير موجود"

return

}

const {
data,
error
}
=
await supabaseClient
.from("products")
.select("*")
.eq("id",productId)
.single()

if(error || !data){

container.innerHTML =
"فشل تحميل المنتج"

return

}

container.innerHTML =

`

<div class="container">

<div>

<img
src="${data.image}"
onerror="this.src='images/default-product.png'"
>

</div>

<div>

<h1>
${data.title}
</h1>

<p>
${data.description}
</p>

<div class="price">
${data.price} $
</div>

<button class="buy">
طلب شراء
</button>

<a href="https://wa.me/967000000000">

<button class="whatsapp">
استعلام واتساب
</button>

</a>

<h2>
تقييم البائع
</h2>

<p>
★★★★★
</p>

</div>

</div>

`

}

loadProduct()

</script>

</body>

</html>
