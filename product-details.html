<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
body{
background:#041C3A;
font-family:'Tajawal',sans-serif;
margin:0;
padding:40px;
color:white;
}
.container{
background:#06264D;
padding:30px;
border-radius:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}
img{
width:100%;
border-radius:20px;
}
h1{
color:#D4AF37;
}
.price{
font-size:30px;
margin:20px 0;
}
button{
padding:15px 25px;
border:none;
border-radius:10px;
font-weight:bold;
margin-left:10px;
cursor:pointer;
}
.buy{
background:#D4AF37;
}
.whatsapp{
background:#25D366;
color:white;
}
</style>
</head>
<body>
<div class="container">
<div>
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200&auto=format&fit=crop">
</div>
<div>
<h1>iPhone 15 Pro</h1>
<p>
هاتف احترافي بمواصفات عالية وكاميرا قوية.
</p>
<div class="price">1200$</div>
<button class="buy">طلب شراء</button>
<a href="https://wa.me/967000000000">
<button class="whatsapp">استعلام واتساب</button>
</a>
<h2>تقييم البائع</h2>
<p>★★★★★</p>
</div>
</div>
</body>
</html>
