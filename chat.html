<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
المحادثة
</title>

<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#041C3A;
font-family:Tajawal;
margin:0;
padding:30px;
color:white;
}

.box{
max-width:900px;
margin:auto;
background:#06264D;
padding:20px;
border-radius:20px;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
color:#D4AF37;
}

.messages{
height:500px;
overflow:auto;
background:#0b2f5c;
padding:20px;
border-radius:15px;
margin-bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:12px;
border-radius:12px;
max-width:70%;
line-height:1.7;
}

.me{
background:#D4AF37;
color:#041C3A;
align-self:flex-end;
}

.other{
background:#163d70;
align-self:flex-start;
}

.inputBox{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
background:#163d70;
color:white;
}

button{
padding:15px 25px;
background:#D4AF37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<div class="title">
المحادثة
</div>

<div
class="messages"
id="messages">
</div>

<div class="inputBox">

<input
id="messageInput"
placeholder="اكتب رسالتك">

<button
onclick="sendMessage()">

إرسال

</button>

</div>

</div>

<script>

const SUPABASE_URL =
"https://dkhjaktcjbnndxtxcetf.supabase.co"

const SUPABASE_KEY =
"sb_publishable_Xuhcjef7xW1PFpSuVLmK8A_rFXBFcMd"

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const params =
new URLSearchParams(
window.location.search
)

const conversationId =
params.get(
"conversation_id"
)

let currentUserId = ""

async function loadMessages(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

currentUserId =
session.user.id

const {
data,
error
}
=
await supabaseClient
.from("messages")
.select("*")
.eq(
"conversation_id",
conversationId
)
.order(
"created_at",
{ascending:true}
)

if(error){

console.log(error)

return

}

const container =
document.getElementById(
"messages"
)

container.innerHTML = ""

if(!data || !data.length){

container.innerHTML =
"لا توجد رسائل"

return

}

data.forEach(msg=>{

const myMessage =
msg.sender_id === currentUserId

container.innerHTML += `

<div class="
message
${myMessage ? "me" : "other"}
">

${msg.message}

</div>

`

})

container.scrollTop =
container.scrollHeight

}

async function sendMessage(){

const {
data:{session}
}
=
await supabaseClient.auth.getSession()

const text =
document.getElementById(
"messageInput"
).value.trim()

if(!text)return

const {
error
}
=
await supabaseClient
.from("messages")
.insert({

conversation_id:
conversationId,

sender_id:
session.user.id,

message:
text

})

if(error){

console.log(error)

alert(error.message)

return

}

document.getElementById(
"messageInput"
).value = ""

}

loadMessages()

supabaseClient
.channel("chat-room")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"messages",
filter:
`conversation_id=eq.${conversationId}`
},
payload=>{

loadMessages()

}
)
.subscribe()

</script>

</body>

</html>
