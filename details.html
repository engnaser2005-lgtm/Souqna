<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تفاصيل المنتج</title>
  <style>
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .container img {
      width: 350px;
      height: 350px;
      object-fit: cover;
      border-radius: 12px;
    }
    .info {
      flex: 1;
      min-width: 250px;
    }
    .info h1 {
      margin-top: 0;
      color: #222;
    }
    .price {
      font-size: 28px;
      color: #007bff;
      font-weight: bold;
      margin: 20px 0;
    }
    .btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      width: 100%;
    }
    .btn:hover {
      background: #218838;
    }
    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #007bff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">← رجوع للرئيسية</a>
  <div id="productDetail">جاري التحميل...</div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://guhocivwbrfhgjynzesy.supabase.co'
    const supabaseKey = 'sb_publishable_w0yAXfyfGpu0IHw64IINgA_cyLEZyN1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const urlParams = new URLSearchParams(window.location.search)
    const productId = urlParams.get('id')

    async function loadProduct() {
      if (!productId) {
        document.getElementById('productDetail').innerHTML = '<p>المنتج غير موجود</p>'
        return
      }

      const { data, error } = await supabase
        .from('products')
        .select('*')
        .eq('id', productId)
        .single()

      if (error || !data) {
        document.getElementById('productDetail').innerHTML = '<p>المنتج غير موجود</p>'
        console.error(error)
        return
      }

      document.getElementById('productDetail').innerHTML = `
        <div class="container">
          <img src="${data.image_url || 'https://via.placeholder.com/350x350?text=No+Image'}" alt="${data.name}">
          <div class="info">
            <h1>${data.name}</h1>
            <p class="price">${data.price} ريال</p>
            <p>${data.description || 'لا يوجد وصف للمنتج'}</p>
            <button class="btn">إتمام الشراء</button>
          </div>
        </div>
      `
    }

    loadProduct()
  </script>

</body>
</html>
