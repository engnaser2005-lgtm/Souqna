<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
body{
background:#041C3A;
font-family:'Tajawal',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.form-box{
background:#06264D;
padding:40px;
border-radius:20px;
width:400px;
color:white;
}
h1{
text-align:center;
color:#D4AF37;
}
input{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#0b2f5c;
color:white;
}
button{
width:100%;
padding:15px;
margin-top:20px;
background:#D4AF37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>
<div class="form-box">
<h1>تسجيل الدخول</h1>
<input type="email" placeholder="البريد الإلكتروني">
<input type="password" placeholder="كلمة المرور">
<button>دخول</button>
</div>
</body>
</html>
